# Configuration de test sans Docker ni base de données externe
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  
  flyway:
    enabled: false
  
  redis:
    host: localhost
    port: 6379

logging:
  level:
    com.orabank.smsbanking: DEBUG
    org.springframework: INFO

twilio:
  account:
    sid: TEST_ACCOUNT_SID
  auth:
    token: test_auth_token
  phone:
    number: +1234567890

otp:
  length: 6
  validity:
    minutes: 5

rate:
  limit:
    requests: 100
    window:
      minutes: 1

encryption:
  key: test_32_character_encryption_key

core:
  banking:
    base:
      url: http://localhost:8082/api

server:
  port: 0
