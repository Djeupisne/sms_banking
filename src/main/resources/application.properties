# Spring Boot Application Properties
spring.application.name=orabank-sms-banking

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/orabank_sms
spring.datasource.username=orabank_user
spring.datasource.password=secure_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms

# Logging Configuration
logging.level.com.orabank.smsbanking=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# JWT Configuration
jwt.secret=your_jwt_secret_key_for_tokens
jwt.expiration-ms=3600000

# Twilio Configuration
twilio.account.sid=ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
twilio.auth.token=your_auth_token_here
twilio.phone.number=+1234567890

# OTP Configuration
otp.length=6
otp.validity.minutes=5

# Rate Limit Configuration
rate.limit.requests=5
rate.limit.window.minutes=1

# Encryption Configuration
encryption.key=your_32_character_encryptions_key

# Core Banking Configuration
core.banking.base.url=http://localhost:8081/api

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Brevo Configuration
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:noreply@orabank.tg}
brevo.sender.name=${BREVO_SENDER_NAME:Orabank SMS Banking}

# Frontend URL
app.frontend.url=${FRONTEND_URL:http://localhost:3001}

# Mobile Money Configuration
mobile-money.max-amount=500000
mobile-money.fees.percentage=10.0
mobile-money.fees.min-amount=0
mobile-money.fees.max-amount=50000
mobile-money.fees.enabled=true