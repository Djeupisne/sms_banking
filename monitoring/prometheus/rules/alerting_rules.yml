groups:
  - name: orabank_sms_banking_alerts
    interval: 30s
    rules:
      # ===========================================
      # ALERTES DE DISPONIBILITÉ
      # ===========================================
      
      - alert: ServiceDown
        expr: up{job="orabank-sms-banking"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Service Orabank SMS Banking est DOWN"
          description: "L'instance {{ $labels.instance }} ne répond plus depuis plus d'une minute."
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/service-down.md"

      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5..", job="orabank-sms-banking"}[5m])) 
          / 
          sum(rate(http_server_requests_seconds_count{job="orabank-sms-banking"}[5m])) > 0.01
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Taux d'erreur HTTP élevé"
          description: "Le taux d'erreur HTTP 5xx est de {{ $value | humanizePercentage }} sur les 5 dernières minutes."
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/high-error-rate.md"

      # ===========================================
      # ALERTES DE PERFORMANCE
      # ===========================================
      
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, 
            sum(rate(http_server_requests_seconds_bucket{job="orabank-sms-banking"}[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Latence HTTP P95 élevée"
          description: "La latence P95 est de {{ $value | humanizeDuration }}, supérieure à 500ms."
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/high-latency.md"

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99, 
            sum(rate(http_server_requests_seconds_bucket{job="orabank-sms-banking"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Latence HTTP P99 critique"
          description: "La latence P99 est de {{ $value | humanizeDuration }}, supérieure à 1 seconde."
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/high-latency.md"

      - alert: SlowSMSEndpoint
        expr: |
          histogram_quantile(0.95, 
            sum(rate(http_server_requests_seconds_bucket{uri=~"/api/.*", job="orabank-sms-banking"}[5m])) by (le, uri)
          ) > 0.3
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Endpoint SMS lent détecté"
          description: "L'endpoint {{ $labels.uri }} a une latence P95 de {{ $value | humanizeDuration }}."

      # ===========================================
      # ALERTES DE CAPACITÉ
      # ===========================================
      
      - alert: HighMemoryUsage
        expr: |
          jvm_memory_used_bytes{area="heap", job="orabank-sms-banking"} 
          / 
          jvm_memory_max_bytes{area="heap", job="orabank-sms-banking"} > 0.85
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Utilisation mémoire JVM élevée"
          description: "La mémoire heap JVM utilise {{ $value | humanizePercentage }} de la mémoire maximale."
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/high-memory.md"

      - alert: CriticalMemoryUsage
        expr: |
          jvm_memory_used_bytes{area="heap", job="orabank-sms-banking"} 
          / 
          jvm_memory_max_bytes{area="heap", job="orabank-sms-banking"} > 0.95
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Utilisation mémoire JVM critique"
          description: "La mémoire heap JVM utilise {{ $value | humanizePercentage }} - Risque d'OutOfMemoryError imminent!"
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/critical-memory.md"

      - alert: HighCPUUsage
        expr: |
          process_cpu_usage{job="orabank-sms-banking"} > 0.8
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Utilisation CPU élevée"
          description: "L'application utilise {{ $value | humanizePercentage }} du CPU."

      - alert: LowActiveThreads
        expr: |
          jvm_threads_live_threads{job="orabank-sms-banking"} < 10
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Nombre de threads actif anormalement bas"
          description: "Seulement {{ $value }} threads sont actifs, ce qui peut indiquer un problème."

      # ===========================================
      # ALERTES DATABASE (PostgreSQL)
      # ===========================================
      
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          hikaricp_connections_pending{job="orabank-sms-banking"} > 10
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Pool de connexions DB saturé"
          description: "{{ $value }} connexions en attente dans le pool HikariCP."
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/db-pool-exhausted.md"

      - alert: DatabaseSlowQueries
        expr: |
          rate(hikaricp_connections_timeout_total{job="orabank-sms-banking"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "Timeouts de connexions DB détectés"
          description: "{{ $value }} timeouts de connexion par seconde en moyenne."

      # ===========================================
      # ALERTES REDIS
      # ===========================================
      
      - alert: RedisConnectionFailed
        expr: |
          redis_connection_pool_active{job="orabank-sms-banking"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Aucune connexion Redis active"
          description: "Le pool de connexions Redis est vide. Vérifier la connectivité Redis."
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/redis-connection.md"

      - alert: RedisHighMemoryUsage
        expr: |
          redis_memory_used_bytes{job="orabank-sms-banking"} 
          / 
          redis_memory_max_bytes{job="orabank-sms-banking"} > 0.85
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Utilisation mémoire Redis élevée"
          description: "Redis utilise {{ $value | humanizePercentage }} de sa mémoire maximale."

      # ===========================================
      # ALERTES CIRCUIT BREAKER
      # ===========================================
      
      - alert: CircuitBreakerOpen
        expr: |
          resilience4j_circuitbreaker_state{state="open", job="orabank-sms-banking"} == 1
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Circuit Breaker ouvert"
          description: "Le circuit breaker {{ $labels.name }} est OPEN. Les appels vers ce service sont bloqués."
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/circuit-breaker-open.md"

      - alert: CircuitBreakerHalfOpen
        expr: |
          resilience4j_circuitbreaker_state{state="half_open", job="orabank-sms-banking"} == 1
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Circuit Breaker en HALF_OPEN"
          description: "Le circuit breaker {{ $labels.name }} est en HALF_OPEN depuis plus de 5 minutes."

      # ===========================================
      # ALERTES RATE LIMITING
      # ===========================================
      
      - alert: HighRateLimitRejection
        expr: |
          sum(rate(resilience4j_ratelimiter_failed_calls_total{job="orabank-sms-banking"}[5m])) 
          / 
          sum(rate(resilience4j_ratelimiter_calls_total{job="orabank-sms-banking"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Taux élevé de requêtes rejetées par Rate Limiter"
          description: "{{ $value | humanizePercentage }} des requêtes sont rejetées par le rate limiter."

      # ===========================================
      # ALERTES BUSINESS MÉTIER
      # ===========================================
      
      - alert: HighTransactionFailureRate
        expr: |
          sum(rate(transactions_failed_total{job="orabank-sms-banking"}[5m])) 
          / 
          sum(rate(transactions_total{job="orabank-sms-banking"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Taux d'échec de transactions élevé"
          description: "{{ $value | humanizePercentage }} des transactions échouent."
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/transaction-failures.md"

      - alert: NoTransactionsProcessed
        expr: |
          increase(transactions_total{job="orabank-sms-banking"}[10m]) == 0
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Aucune transaction traitée"
          description: "Aucune transaction n'a été traitée depuis 10 minutes."

      - alert: HighOTPFailureRate
        expr: |
          sum(rate(otp_validation_failed_total{job="orabank-sms-banking"}[5m])) 
          / 
          sum(rate(otp_validation_total{job="orabank-sms-banking"}[5m])) > 0.3
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "Taux d'échec de validation OTP élevé"
          description: "{{ $value | humanizePercentage }} des validations OTP échouent. Possible attaque ou problème système."

      - alert: SuspiciousActivityDetected
        expr: |
          sum(rate(suspicious_activity_detected_total{job="orabank-sms-banking"}[5m])) > 10
        for: 5m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "Activité suspecte détectée"
          description: "{{ $value }} activités suspectes détectées par seconde en moyenne."
          runbook_url: "https://github.com/orabank/sms-banking/tree/main/docs/runbooks/security-incident.md"

      # ===========================================
      # ALERTES INFRASTRUCTURE
      # ===========================================
      
      - alert: PodRestarting
        expr: |
          increase(kube_pod_container_status_restarts_total{container="orabank-sms-banking"}[1h]) > 3
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Pod redémarrage fréquemment"
          description: "Le pod {{ $labels.pod }} a redémarré {{ $value }} fois dans la dernière heure."

      - alert: DiskSpaceLow
        expr: |
          node_filesystem_avail_bytes{mountpoint="/", job="node-exporter"} 
          / 
          node_filesystem_size_bytes{mountpoint="/", job="node-exporter"} < 0.1
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Espace disque faible"
          description: "Il ne reste que {{ $value | humanizePercentage }} d'espace disque sur {{ $labels.instance }}."
