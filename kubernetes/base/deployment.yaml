apiVersion: apps/v1
kind: Deployment
metadata:
  name: orabank-sms-banking
  labels:
    app: orabank-sms-banking
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orabank-sms-banking
  template:
    metadata:
      labels:
        app: orabank-sms-banking
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: sms-banking
          image: orabank/sms-banking:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: orabank-db-secret
                  key: host
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: orabank-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orabank-db-secret
                  key: password
            - name: REDIS_HOST
              value: "redis-master"
            - name: REDIS_PORT
              value: "6379"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: orabank-sms-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - orabank-sms-banking
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 60

---
apiVersion: v1
kind: Service
metadata:
  name: orabank-sms-banking
  labels:
    app: orabank-sms-banking
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: orabank-sms-banking

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orabank-sms-banking-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orabank-sms-banking
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orabank-sms-banking-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sms-banking.orabank.com
      secretName: orabank-sms-tls
  rules:
    - host: sms-banking.orabank.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orabank-sms-banking
                port:
                  number: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: orabank-sms-banking-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: orabank-sms-banking

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orabank-sms-config
data:
  application.yml: |
    server:
      port: 8080
      shutdown: graceful
    
    spring:
      lifecycle:
        timeout-per-shutdown-phase: 30s
      
      datasource:
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
          connection-timeout: 30000
          idle-timeout: 600000
          max-lifetime: 1800000
      
      data:
        redis:
          timeout: 2000ms
      
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus,metrics,circuitbreakers
      endpoint:
        health:
          show-details: when_authorized
          probes:
            enabled: true
    
    resilience4j:
      circuitbreaker:
        configs:
          default:
            slidingWindowSize: 10
            failureRateThreshold: 50
            waitDurationInOpenState: 30000
            permittedNumberOfCallsInHalfOpenState: 5
            automaticTransitionFromOpenToHalfOpenEnabled: true
        instances:
          mobileMoneyService:
            baseConfig: default
          smsGateway:
            baseConfig: default
      timelimiter:
        configs:
          default:
            timeoutDuration: 3s
            cancelRunningFuture: true
      ratelimiter:
        configs:
          default:
            limitForPeriod: 100
            limitRefreshPeriod: 1s
            timeoutDuration: 0s
